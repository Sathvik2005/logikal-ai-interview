<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join Logikality AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;900&amp;family=Inter:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#ffd2be",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#006172",
                        "on-primary-fixed": "#0f0069",
                        "outline-variant": "#c7c4d8",
                        "on-surface": "#0b1c30",
                        "on-surface-variant": "#464555",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#acedff",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-fixed": "#001f26",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-primary-container": "#dad7ff",
                        "on-background": "#0b1c30",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-low": "#eff4ff",
                        "primary-container": "#4f46e5",
                        "on-secondary-fixed-variant": "#004e5c",
                        "surface-variant": "#d3e4fe",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "surface-container-highest": "#d3e4fe",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "surface-container": "#e5eeff",
                        "surface": "#f8f9ff",
                        "tertiary": "#7e3000",
                        "surface-tint": "#4d44e3",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-secondary": "#ffffff",
                        "outline": "#777587",
                        "on-tertiary-fixed": "#351000",
                        "primary-fixed": "#e2dfff",
                        "inverse-surface": "#213145",
                        "secondary": "#00687a",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-high": "#dce9ff",
                        "secondary-container": "#57dffe",
                        "tertiary-fixed": "#ffdbcc",
                        "tertiary-fixed-dim": "#ffb695",
                        "tertiary-container": "#a44100",
                        "primary": "#3525cd",
                        "secondary-fixed-dim": "#4cd7f6",
                        "background": "#f8f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "40px",
                        "container-max": "1440px",
                        "sm": "8px",
                        "xs": "4px",
                        "gutter": "24px",
                        "md": "16px",
                        "lg": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "data-mono": ["JetBrains Mono"],
                        "display-lg": ["Geist"],
                        "label-caps": ["Inter"],
                        "headline-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "headline-sm": ["Geist"],
                        "headline-lg": ["Geist"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "data-mono": ["13px", { "lineHeight": "1.4", "fontWeight": "450" }],

                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],

                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]

                }
            }
        }

<style>
        .radial-gradient-bg {
            background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.08) 0%, transparent 50%);
            background-color: var(--color-background);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 24px -2px rgba(0, 0, 0, 0.03), 0 1px 3px 0 rgba(0, 0, 0, 0.02);
        }
        .input-focus-ring:focus-within {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen radial-gradient-bg flex items-center justify-center p-md md:p-xl font-body-md">
<!-- Suppressed navigation shell due to transactional intent -->
<div class="w-full max-w-[480px]">
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs tracking-tight">Logikality AI</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Executive-grade recruitment intelligence.</p>
</div>
<div class="glass-panel rounded-xl p-lg md:p-xl">
<h2 class="font-headline-md text-headline-md text-on-surface mb-md">Create your account</h2>
<form action="#" class="space-y-md" method="POST">
<div class="space-y-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="fullName">Full Name</label>
<div class="relative input-focus-ring rounded-lg border border-outline-variant bg-surface-container-lowest transition-all duration-200">
<input class="block w-full rounded-lg border-0 bg-transparent py-3 px-4 text-on-surface placeholder:text-outline focus:ring-0 font-body-md" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<div class="space-y-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="workEmail">Work Email</label>
<div class="relative input-focus-ring rounded-lg border border-outline-variant bg-surface-container-lowest transition-all duration-200">
<input class="block w-full rounded-lg border-0 bg-transparent py-3 px-4 text-on-surface placeholder:text-outline focus:ring-0 font-body-md" id="workEmail" name="workEmail" placeholder="jane@company.com" required="" type="email"/>
</div>
</div>
<div class="space-y-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative input-focus-ring rounded-lg border border-outline-variant bg-surface-container-lowest transition-all duration-200">
<input class="block w-full rounded-lg border-0 bg-transparent py-3 px-4 text-on-surface placeholder:text-outline focus:ring-0 font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<p class="font-body-md text-body-md text-outline text-[13px] mt-1">Must be at least 8 characters long.</p>
</div>
<div class="pt-sm">
<button class="w-full flex justify-center items-center gap-2 bg-primary text-on-primary font-headline-sm text-headline-sm py-3 px-4 rounded-xl hover:bg-primary-fixed-variant transition-colors shadow-sm hover:shadow-md" type="submit">
                        Join Logikality AI
                    </button>
</div>
</form>
<div class="mt-lg mb-lg flex items-center justify-between">
<hr class="w-full border-outline-variant"/>
<span class="px-3 font-label-caps text-label-caps text-outline uppercase tracking-wider bg-white">Or</span>
<hr class="w-full border-outline-variant"/>
</div>
<div class="space-y-3">
<button class="w-full flex justify-center items-center gap-3 bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md py-3 px-4 rounded-xl hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                    Sign up with Google
                </button>
<button class="w-full flex justify-center items-center gap-3 bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md py-3 px-4 rounded-xl hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><path d="M10 0H0V10H10V0Z" fill="#F25022"></path><path d="M21 0H11V10H21V0Z" fill="#7FBA00"></path><path d="M10 11H0V21H10V11Z" fill="#00A4EF"></path><path d="M21 11H11V21H21V11Z" fill="#FFB900"></path></svg>
                    Sign up with Microsoft
                </button>
</div>
</div>
<p class="text-center mt-lg font-body-md text-body-md text-on-surface-variant">
            Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Log in</a>
</p>
</div>
</body></html>
