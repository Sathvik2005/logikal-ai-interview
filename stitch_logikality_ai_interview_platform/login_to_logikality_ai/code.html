<!DOCTYPE html>

<style>
        /* Minimalist layered paper aesthetic & subtle geometric background */
        body {
            background-color: theme('colors.background');
            background-image: radial-gradient(theme('colors.outline-variant') 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: -16px -16px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.03);
        }

        /* Custom input focus ring */
        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); /* primary-container approx */
        }
    </style>

<body class="min-h-screen flex flex-col items-center justify-center p-gutter relative antialiased text-on-surface">
<!-- Decorative atmospheric blob (Subtle) -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-[420px] z-10 flex flex-col items-center">
<!-- Brand Anchor -->
<div class="mb-xl text-center">
<h1 class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg font-extrabold text-primary tracking-tight">Logikality AI</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Enterprise Grade Recruitment</p>
</div>
<!-- Login Card -->
<div class="glass-card w-full rounded-xl border border-outline-variant p-xl flex flex-col">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-lg">Sign in to your account</h2>
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">mail</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary-container transition-colors placeholder:text-outline/60" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs mt-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">lock</span>
<input class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary-container transition-colors placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions Row -->
<div class="flex items-center justify-between mt-sm">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<a class="font-body-md text-body-md text-primary-container hover:text-primary hover:underline font-medium transition-colors" href="#">
                        Forgot password?
                    </a>
</div>
<!-- Primary CTA -->
<button class="mt-md w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-caps text-label-caps text-white bg-primary-container hover:brightness-110 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-all active:scale-[0.98]" type="submit">
                    Sign In
                    <span class="material-symbols-outlined ml-2 text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="mt-xl mb-lg relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center">
<span class="px-2 bg-white font-label-caps text-label-caps text-outline uppercase tracking-wider">Or continue with</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex justify-center items-center gap-2 w-full px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm font-body-md text-body-md font-medium text-on-surface hover:bg-surface-container-low hover:border-outline transition-colors" type="button">
<svg class="h-5 w-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex justify-center items-center gap-2 w-full px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm font-body-md text-body-md font-medium text-on-surface hover:bg-surface-container-low hover:border-outline transition-colors" type="button">
<svg class="h-5 w-5" fill="none" viewbox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
<path d="M10 0H0V10H10V0Z" fill="#F25022"></path>
<path d="M21 0H11V10H21V0Z" fill="#7FBA00"></path>
<path d="M10 11H0V21H10V11Z" fill="#00A4EF"></path>
<path d="M21 11H11V21H21V11Z" fill="#FFB900"></path>
</svg>
                    Microsoft
                </button>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-xl flex flex-col md:flex-row items-center justify-center gap-x-lg gap-y-2 text-center">
<span class="font-body-md text-body-md text-on-surface-variant/80">© 2024 Logikality AI</span>
<div class="flex items-center gap-4">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">Privacy Policy</a>
<span class="text-outline-variant text-xs">•</span>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">Terms of Service</a>
</div>
</footer>
</main>
</body></html>
